<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours — Cartographie du secteur public</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="entete-site">
    <a class="titre-site" href="index.html">Cartographie du secteur public</a>
    <nav class="nav-principale" aria-label="Navigation principale">
      <a href="employeurs.html">Employeurs</a>
      <a href="concours.html">Concours</a>
    </nav>
  </header>

  <h1>Les concours du secteur public</h1>

  <section id="filtres" aria-label="Filtres">
    <div class="filtre-groupe">
      <label for="filtre-filiere">Filière</label>
      <select id="filtre-filiere">
        <option value="">Toutes les filières</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-versant">Versant</label>
      <select id="filtre-versant">
        <option value="">Tous les versants</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-type">Type</label>
      <select id="filtre-type">
        <option value="">Tous les types</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-categorie">Catégorie</label>
      <select id="filtre-categorie">
        <option value="">Toutes les catégories</option>
      </select>
    </div>

    <div class="filtre-groupe filtre-secteurs-groupe">
      <span class="filtre-secteurs-etiquette">Secteur</span>
      <button
        type="button"
        id="bouton-secteurs"
        class="bouton-secteurs"
        aria-expanded="false"
        aria-controls="filtre-secteurs"
      >Secteurs</button>
      <fieldset id="filtre-secteurs" class="panneau-secteurs" hidden>
        <legend>Secteur</legend>
        <div class="panneau-secteurs-corps">
          <button type="button" id="reinitialiser-secteurs" class="reinitialiser-secteurs">Réinitialiser</button>
          <div id="cases-secteurs" class="cases-secteurs"></div>
        </div>
      </fieldset>
    </div>

    <button type="button" id="reinitialiser-filtres">Réinitialiser les filtres</button>
  </section>

  <p id="compteur-concours" aria-live="polite"></p>

  <div id="liste-concours" aria-live="polite">
    <p>Chargement des concours...</p>
  </div>

  <script type="module" src="js/concours.js"></script>
</body>
</html>
