<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concours — Cartographie du secteur public</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="index.html">&larr; Retour à l'accueil</a>
  <h1>Les concours du secteur public</h1>

  <section id="filtres" aria-label="Filtres">
    <div class="filtre-groupe">
      <label for="filtre-filiere">Filière</label>
      <select id="filtre-filiere">
        <option value="">Toutes les filières</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-versant">Versant</label>
      <select id="filtre-versant">
        <option value="">Tous les versants</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-type">Type</label>
      <select id="filtre-type">
        <option value="">Tous les types</option>
      </select>
    </div>

    <div class="filtre-groupe">
      <label for="filtre-categorie">Catégorie</label>
      <select id="filtre-categorie">
        <option value="">Toutes les catégories</option>
      </select>
    </div>

    <fieldset id="filtre-secteurs" class="filtre-groupe">
      <legend>Secteur</legend>
    </fieldset>

    <button type="button" id="reinitialiser-filtres">Réinitialiser les filtres</button>
  </section>

  <p id="compteur-concours" aria-live="polite"></p>

  <div id="liste-concours">
    <p>Chargement des concours...</p>
  </div>

  <script type="module" src="js/concours.js"></script>
</body>
</html>
